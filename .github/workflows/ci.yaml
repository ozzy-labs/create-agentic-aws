name: ci

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # trivy はこのリポでは未使用。mise の aqua バックエンドが
          # GitHub API レート制限に頻繁に当たり CI を失敗させるため、
          # 上流 commons で扱いを整理するまで CI ではスキップする。
          MISE_DISABLE_TOOLS: trivy

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:all

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test with coverage
        run: pnpm test -- --coverage

      - name: Build
        run: pnpm run build

      - name: Verify generated projects
        run: |
          npx tsx scripts/generate-test-projects.ts
          node -e "
            const fs = require('fs');
            const path = require('path');
            let errors = 0;
            function walk(dir) {
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) { walk(full); continue; }
                if (entry.name.endsWith('.json') || entry.name.endsWith('.jsonc')) {
                  try { JSON.parse(fs.readFileSync(full, 'utf-8')); }
                  catch (e) { console.error('Invalid JSON:', full, e.message); errors++; }
                }
              }
            }
            walk('tmp');
            if (errors) { console.error(errors + ' invalid JSON file(s)'); process.exit(1); }
            console.log('All generated JSON files are valid');
          "
