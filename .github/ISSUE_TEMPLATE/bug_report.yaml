name: バグ報告
description: 再現手順付きのバグ報告
labels: ["type:fix"]
body:
  - type: textarea
    id: description
    attributes:
      label: 概要
      description: バグの内容を簡潔に記述してください。
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 再現手順
      description: バグを再現する手順を記述してください。
      placeholder: |
        1. `pnpm create agentic-aws my-app` を実行
        2. ... を選択
        3. エラーが発生
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どのように動作すべきか。
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際に何が起きたか。
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: バージョン
      description: "`npx create-agentic-aws --version` の出力"
      placeholder: "0.1.0"
  - type: textarea
    id: context
    attributes:
      label: 補足情報
      description: OS、Node.js バージョン、スクリーンショットなど。
